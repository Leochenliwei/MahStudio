# PanelKit 工作台项目 Nginx 配置
# 部署路径: /etc/nginx/sites-available/webconfig

server {
    listen 80;
    server_name _;  # 监听所有域名

    # 项目基础路径
    location /MahStudio/ {
        alias /var/www/webconfig/dist/;
        try_files $uri $uri/ /MahStudio/index.html;
        
        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 反向代理
    location /MahStudio/api/ {
        proxy_pass http://localhost:4174/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 健康检查
    location /MahStudio/health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
